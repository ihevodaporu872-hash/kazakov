name: Update Crypto Balances

on:
  schedule:
    # Каждый час в 0 минут
    - cron: '0 * * * *'
  # Ручной запуск из интерфейса GitHub
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: chernovik

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create service account file
        run: python -c "import os; open('service_account.json','w').write(os.environ['GOOGLE_SA'])"
        env:
          GOOGLE_SA: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

      - name: Run balance update
        run: python main.py
